<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chinu ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff477e;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .heart {
            font-size: 50px;
            color: #ff477e;
            animation: beat 1s infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes beat {
            to { transform: scale(1.1); }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff5c8a;
        }

        #noBtn {
            background-color: #ced4da;
            color: #495057;
            position: absolute;
            transition: all 0.15s ease;
            touch-action: none; /* Prevents clicking on mobile easily */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>I'm So Sorry, Chinu</h1>
        <p>
            I messed up, and I genuinely regret it. You mean the world to me, and I don't want to lose what we have. 
            Can we please give our relationship one more chance?
        </p>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="forgive()">Yes, I forgive you</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Calculate a random position anywhere on the screen
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function forgive() {
            document.querySelector('.container').innerHTML = `
                <div class="heart">💖</div>
                <h1>Thank you, Chinu!</h1>
                <p>Thank you for giving us another chance. I promise to make it right and cherish you every single day. I love you!</p>
            `;
        }
    </script>

</body>
</html>
